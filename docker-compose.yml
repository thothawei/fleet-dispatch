services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DB_HOST: postgis
      REDIS_ADDR: redis:6379
      OSRM_URL: ${OSRM_URL:-http://router.project-osrm.org}
    volumes:
      - ./web/liff:/app/web/liff:ro
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${DB_NAME:-fleet}
      POSTGRES_USER: ${DB_USER:-fleet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fleet} -d ${DB_NAME:-fleet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    environment:
      API_URL: http://app:8080
    depends_on:
      - app
    profiles:
      - simulator

volumes:
  postgis_data:
